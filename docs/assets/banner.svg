<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 520" width="1280" height="520">
  <style>
    :root {
      /* OKLCH-based palette for perceptual uniformity */
      --surface: #ffffff;
      --text-primary: #1c1917;
      --text-secondary: #78716c;
      --text-tertiary: #a8a29e;
      --border: #e7e5e4;
      --border-subtle: #f5f5f4;
      /* Cyan: OKLCH(65% 0.12 195) */
      --cyan: #0d9488;
      --cyan-light: #14b8a6;
      --cyan-glow: rgba(13, 148, 136, 0.08);
      /* Amber: OKLCH(70% 0.14 75) */
      --amber: #d97706;
      --amber-light: #f59e0b;
      --amber-glow: rgba(217, 119, 6, 0.08);
      --box-bg: #fafaf9;
      --box-border: #d6d3d1;
      --grid: #f5f5f4;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --surface: #0c0a09;
        --text-primary: #f5f5f4;
        --text-secondary: #a8a29e;
        --text-tertiary: #57534e;
        --border: #292524;
        --border-subtle: #1c1917;
        --cyan: #2dd4bf;
        --cyan-light: #5eead4;
        --cyan-glow: rgba(45, 212, 191, 0.1);
        --amber: #fbbf24;
        --amber-light: #fcd34d;
        --amber-glow: rgba(251, 191, 36, 0.1);
        --box-bg: #1c1917;
        --box-border: #44403c;
        --grid: #1c1917;
      }
    }
  </style>

  <defs>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="1.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1280" height="520" fill="transparent"/>

  <!-- 极淡网格 -->
  <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
    <path d="M 32 0 L 0 0 0 32" fill="none" stroke="var(--grid)" stroke-width="0.4"/>
  </pattern>
  <rect width="1280" height="520" fill="url(#grid)"/>

  <!-- 极淡的中央光晕 -->
  <ellipse cx="640" cy="200" rx="400" ry="140" fill="var(--cyan-glow)" opacity="0.6"/>

  <!-- ====== 核心视觉 ====== -->
  <g transform="translate(640, 210)">
    <!-- 左侧黑盒 -->
    <g transform="translate(-280, 0)">
      <rect x="-48" y="-40" width="96" height="80" rx="6" fill="var(--box-bg)" stroke="var(--box-border)" stroke-width="1"/>
      <rect x="-40" y="-32" width="80" height="64" rx="3" fill="none" stroke="var(--border)" stroke-width="0.6"/>
      <circle cx="0" cy="-6" r="12" fill="none" stroke="var(--text-tertiary)" stroke-width="1" opacity="0.4"/>
      <circle cx="0" cy="-6" r="6" fill="none" stroke="var(--text-tertiary)" stroke-width="0.8" opacity="0.25"/>
      <rect x="-28" y="16" width="56" height="2.5" rx="1.25" fill="var(--border)"/>
      <rect x="-28" y="23" width="36" height="2.5" rx="1.25" fill="var(--border-subtle)"/>
      <text x="0" y="-2" text-anchor="middle" fill="var(--text-tertiary)" font-family="system-ui, sans-serif" font-size="11" opacity="0.3">?</text>
    </g>

    <!-- 右侧驾驶舱 -->
    <g transform="translate(280, 0)">
      <rect x="-48" y="-40" width="96" height="80" rx="6" fill="var(--box-bg)" stroke="var(--cyan)" stroke-width="1.5" filter="url(#glow)"/>
      <rect x="-40" y="-32" width="80" height="64" rx="3" fill="none" stroke="var(--border)" stroke-width="0.6"/>
      <circle cx="-16" cy="-8" r="8" fill="none" stroke="var(--cyan)" stroke-width="1" opacity="0.5"/>
      <circle cx="-16" cy="-8" r="4" fill="var(--cyan)" opacity="0.1"/>
      <rect x="4" y="-16" width="22" height="2" rx="1" fill="var(--cyan)" opacity="0.35"/>
      <rect x="4" y="-10" width="17" height="2" rx="1" fill="var(--cyan-light)" opacity="0.25"/>
      <rect x="4" y="-4" width="12" height="2" rx="1" fill="var(--cyan)" opacity="0.15"/>
      <circle cx="-26" cy="18" r="2" fill="#10b981" opacity="0.8"/>
      <circle cx="-13" cy="18" r="2" fill="var(--cyan)" opacity="0.5"/>
      <circle cx="0" cy="18" r="2" fill="var(--cyan-light)" opacity="0.4"/>
      <circle cx="13" cy="18" r="2" fill="var(--amber)" opacity="0.4"/>
      <circle cx="26" cy="18" r="2" fill="var(--amber-light)" opacity="0.3"/>
    </g>

    <!-- 桥 -->
    <path d="M -232 10 Q 0 -60 232 10" fill="none" stroke="var(--cyan-glow)" stroke-width="4"/>
    <path d="M -232 10 Q 0 -60 232 10" fill="none" stroke="var(--cyan)" stroke-width="1.2" opacity="0.4"/>

    <!-- 悬索 -->
    <line x1="-155" y1="10" x2="-125" y2="-22" stroke="var(--box-border)" stroke-width="0.7" opacity="0.35"/>
    <line x1="-105" y1="10" x2="-80" y2="-35" stroke="var(--box-border)" stroke-width="0.7" opacity="0.35"/>
    <line x1="-52" y1="10" x2="-35" y2="-42" stroke="var(--box-border)" stroke-width="0.7" opacity="0.35"/>
    <line x1="0" y1="10" x2="0" y2="-46" stroke="var(--box-border)" stroke-width="0.7" opacity="0.35"/>
    <line x1="52" y1="10" x2="35" y2="-42" stroke="var(--box-border)" stroke-width="0.7" opacity="0.35"/>
    <line x1="105" y1="10" x2="80" y2="-35" stroke="var(--box-border)" stroke-width="0.7" opacity="0.35"/>
    <line x1="155" y1="10" x2="125" y2="-22" stroke="var(--box-border)" stroke-width="0.7" opacity="0.35"/>

    <!-- 流动粒子 -->
    <circle cx="-140" cy="0" r="2" fill="var(--cyan)" opacity="0.6">
      <animate attributeName="cx" values="-140;-70;0;70;140" dur="4s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="0;-22;-35;-22;0" dur="4s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.6;0.2;0.2;0.2;0.6" dur="4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="-90" cy="-6" r="1.6" fill="var(--cyan-light)" opacity="0.45">
      <animate attributeName="cx" values="-90;-30;30;90" dur="3.5s" repeatCount="indefinite" begin="0.7s"/>
      <animate attributeName="cy" values="-6;-28;-28;-6" dur="3.5s" repeatCount="indefinite" begin="0.7s"/>
      <animate attributeName="opacity" values="0.45;0.15;0.15;0.45" dur="3.5s" repeatCount="indefinite" begin="0.7s"/>
    </circle>
    <circle cx="-45" cy="-14" r="1.4" fill="var(--amber)" opacity="0.35">
      <animate attributeName="cx" values="-45;0;45" dur="3s" repeatCount="indefinite" begin="1.4s"/>
      <animate attributeName="cy" values="-14;-36;-14" dur="3s" repeatCount="indefinite" begin="1.4s"/>
      <animate attributeName="opacity" values="0.35;0.12;0.35" dur="3s" repeatCount="indefinite" begin="1.4s"/>
    </circle>

    <!-- 底部基准线 -->
    <line x1="-300" y1="42" x2="300" y2="42" stroke="var(--border)" stroke-width="0.6"/>
  </g>

  <!-- ====== 品牌文字：无渐变，纯色 ====== -->
  <g transform="translate(640, 340)">
    <!-- OPEN -->
    <text x="-248" y="0"
          font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif"
          font-size="72"
          font-weight="800"
          letter-spacing="6"
          fill="var(--cyan)">OPEN</text>

    <!-- BRIGE -->
    <text x="-4" y="0"
          font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif"
          font-size="72"
          font-weight="800"
          letter-spacing="6"
          fill="var(--amber)">BRIGE</text>

    <!-- 精密下划线 -->
    <line x1="-280" y1="18" x2="280" y2="18" stroke="var(--border)" stroke-width="1"/>
    <line x1="-200" y1="24" x2="200" y2="24" stroke="var(--border-subtle)" stroke-width="0.5"/>

    <!-- 版本号 -->
    <text x="290" y="-36"
          font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace"
          font-size="12"
          fill="var(--text-tertiary)">v0.1</text>
  </g>

  <!-- ====== 标语 ====== -->
  <g transform="translate(640, 390)">
    <text x="0" y="0"
          text-anchor="middle"
          font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace"
          font-size="12"
          font-weight="400"
          letter-spacing="4"
          fill="var(--text-secondary)">AGENT IS A BLACK BOX. OPENBRIGE IS THE COCKPIT.</text>
  </g>

  <!-- ====== 底部标签：极简 pill ====== -->
  <g transform="translate(640, 430)" opacity="0.45">
    <rect x="-248" y="-10" width="76" height="20" rx="10" fill="none" stroke="var(--border)" stroke-width="0.7"/>
    <text x="-210" y="4" text-anchor="middle" font-family="ui-monospace, monospace" font-size="8" font-weight="500" letter-spacing="0.5" fill="var(--text-secondary)">LOCAL-FIRST</text>

    <rect x="-158" y="-10" width="76" height="20" rx="10" fill="none" stroke="var(--border)" stroke-width="0.7"/>
    <text x="-120" y="4" text-anchor="middle" font-family="ui-monospace, monospace" font-size="8" font-weight="500" letter-spacing="0.5" fill="var(--text-secondary)">OPEN SOURCE</text>

    <rect x="-68" y="-10" width="62" height="20" rx="10" fill="none" stroke="var(--border)" stroke-width="0.7"/>
    <text x="-37" y="4" text-anchor="middle" font-family="ui-monospace, monospace" font-size="8" font-weight="500" letter-spacing="0.5" fill="var(--text-secondary)">AGPL-3.0</text>

    <rect x="10" y="-10" width="68" height="20" rx="10" fill="none" stroke="var(--border)" stroke-width="0.7"/>
    <text x="44" y="4" text-anchor="middle" font-family="ui-monospace, monospace" font-size="8" font-weight="500" letter-spacing="0.5" fill="var(--text-secondary)">TYPESCRIPT</text>

    <rect x="92" y="-10" width="68" height="20" rx="10" fill="none" stroke="var(--border)" stroke-width="0.7"/>
    <text x="126" y="4" text-anchor="middle" font-family="ui-monospace, monospace" font-size="8" font-weight="500" letter-spacing="0.5" fill="var(--text-secondary)">WEBSOCKET</text>

    <rect x="174" y="-10" width="62" height="20" rx="10" fill="none" stroke="var(--border)" stroke-width="0.7"/>
    <text x="205" y="4" text-anchor="middle" font-family="ui-monospace, monospace" font-size="8" font-weight="500" letter-spacing="0.5" fill="var(--text-secondary)">WORKTREE</text>
  </g>

  <!-- ====== 四角刻度 ====== -->
  <g stroke="var(--border)" stroke-width="0.7" fill="none" opacity="0.25">
    <path d="M 40 40 L 40 60 M 40 40 L 60 40"/>
    <circle cx="40" cy="40" r="1.5" fill="var(--border)" stroke="none"/>
    <path d="M 1240 40 L 1240 60 M 1240 40 L 1220 40"/>
    <circle cx="1240" cy="40" r="1.5" fill="var(--border)" stroke="none"/>
    <path d="M 40 480 L 40 460 M 40 480 L 60 480"/>
    <circle cx="40" cy="480" r="1.5" fill="var(--border)" stroke="none"/>
    <path d="M 1240 480 L 1240 460 M 1240 480 L 1220 480"/>
    <circle cx="1240" cy="480" r="1.5" fill="var(--border)" stroke="none"/>
  </g>

  <!-- 边缘线框 -->
  <rect x="16" y="16" width="1248" height="488" rx="2" fill="none" stroke="var(--border)" stroke-width="0.6" opacity="0.3"/>
</svg>