<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 420" width="1200" height="420">
  <style>
    :root {
      --text-primary: #1c1917;
      --text-secondary: #78716c;
      --text-tertiary: #a8a29e;
      --border: #e7e5e4;
      --border-subtle: #f5f5f4;
      --cyan: #0d9488;
      --cyan-light: #14b8a6;
      --cyan-glow: rgba(13, 148, 136, 0.1);
      --amber: #d97706;
      --amber-light: #f59e0b;
      --amber-glow: rgba(217, 119, 6, 0.1);
      --box-bg: #fafaf9;
      --box-border: #d6d3d1;
      --grid: #f5f5f4;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --text-primary: #f5f5f4;
        --text-secondary: #a8a29e;
        --text-tertiary: #57534e;
        --border: #292524;
        --border-subtle: #1c1917;
        --cyan: #2dd4bf;
        --cyan-light: #5eead4;
        --cyan-glow: rgba(45, 212, 191, 0.12);
        --amber: #fbbf24;
        --amber-light: #fcd34d;
        --amber-glow: rgba(251, 191, 36, 0.12);
        --box-bg: #1c1917;
        --box-border: #44403c;
        --grid: #1c1917;
      }
    }
  </style>

  <defs>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1200" height="420" fill="transparent"/>

  <!-- 网格 -->
  <pattern id="grid" width="28" height="28" patternUnits="userSpaceOnUse">
    <path d="M 28 0 L 0 0 0 28" fill="none" stroke="var(--grid)" stroke-width="0.5"/>
  </pattern>
  <rect width="1200" height="420" fill="url(#grid)"/>

  <!-- 中央光晕 -->
  <ellipse cx="600" cy="170" rx="380" ry="120" fill="var(--cyan-glow)" opacity="0.8"/>

  <!-- ====== 核心视觉：桥接 ====== -->
  <g transform="translate(600, 175)">
    <!-- 左侧黑盒 -->
    <g transform="translate(-260, 0)">
      <rect x="-56" y="-44" width="112" height="88" rx="8" fill="var(--box-bg)" stroke="var(--box-border)" stroke-width="1.2"/>
      <rect x="-48" y="-36" width="96" height="72" rx="4" fill="none" stroke="var(--border)" stroke-width="0.8"/>
      <circle cx="0" cy="-6" r="14" fill="none" stroke="var(--text-tertiary)" stroke-width="1.2" opacity="0.4"/>
      <circle cx="0" cy="-6" r="7" fill="none" stroke="var(--text-tertiary)" stroke-width="0.8" opacity="0.25"/>
      <rect x="-32" y="18" width="64" height="3" rx="1.5" fill="var(--border)"/>
      <rect x="-32" y="26" width="42" height="3" rx="1.5" fill="var(--border-subtle)"/>
      <text x="0" y="-2" text-anchor="middle" fill="var(--text-tertiary)" font-family="system-ui, sans-serif" font-size="14" opacity="0.25">?</text>
    </g>

    <!-- 右侧驾驶舱 -->
    <g transform="translate(260, 0)">
      <rect x="-56" y="-44" width="112" height="88" rx="8" fill="var(--box-bg)" stroke="var(--cyan)" stroke-width="2" filter="url(#glow)"/>
      <rect x="-48" y="-36" width="96" height="72" rx="4" fill="none" stroke="var(--border)" stroke-width="0.8"/>
      <circle cx="-18" cy="-8" r="10" fill="none" stroke="var(--cyan)" stroke-width="1.2" opacity="0.6"/>
      <circle cx="-18" cy="-8" r="5" fill="var(--cyan)" opacity="0.12"/>
      <rect x="5" y="-18" width="28" height="2.5" rx="1.25" fill="var(--cyan)" opacity="0.4"/>
      <rect x="5" y="-11" width="22" height="2.5" rx="1.25" fill="var(--cyan-light)" opacity="0.3"/>
      <rect x="5" y="-4" width="16" height="2.5" rx="1.25" fill="var(--cyan)" opacity="0.2"/>
      <circle cx="-30" cy="20" r="2.5" fill="#10b981" opacity="0.85"/>
      <circle cx="-15" cy="20" r="2.5" fill="var(--cyan)" opacity="0.55"/>
      <circle cx="0" cy="20" r="2.5" fill="var(--cyan-light)" opacity="0.45"/>
      <circle cx="15" cy="20" r="2.5" fill="var(--amber)" opacity="0.45"/>
      <circle cx="30" cy="20" r="2.5" fill="var(--amber-light)" opacity="0.35"/>
    </g>

    <!-- 桥 -->
    <path d="M -204 12 Q 0 -58 204 12" fill="none" stroke="var(--cyan-glow)" stroke-width="5"/>
    <path d="M -204 12 Q 0 -58 204 12" fill="none" stroke="var(--cyan)" stroke-width="1.5" opacity="0.5"/>

    <!-- 悬索 -->
    <line x1="-140" y1="12" x2="-115" y2="-18" stroke="var(--box-border)" stroke-width="0.8" opacity="0.4"/>
    <line x1="-95" y1="12" x2="-75" y2="-32" stroke="var(--box-border)" stroke-width="0.8" opacity="0.4"/>
    <line x1="-48" y1="12" x2="-32" y2="-40" stroke="var(--box-border)" stroke-width="0.8" opacity="0.4"/>
    <line x1="0" y1="12" x2="0" y2="-44" stroke="var(--box-border)" stroke-width="0.8" opacity="0.4"/>
    <line x1="48" y1="12" x2="32" y2="-40" stroke="var(--box-border)" stroke-width="0.8" opacity="0.4"/>
    <line x1="95" y1="12" x2="75" y2="-32" stroke="var(--box-border)" stroke-width="0.8" opacity="0.4"/>
    <line x1="140" y1="12" x2="115" y2="-18" stroke="var(--box-border)" stroke-width="0.8" opacity="0.4"/>

    <!-- 流动粒子 -->
    <circle cx="-130" cy="0" r="2.5" fill="var(--cyan)" opacity="0.7">
      <animate attributeName="cx" values="-130;-65;0;65;130" dur="4s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="0;-20;-32;-20;0" dur="4s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.7;0.25;0.25;0.25;0.7" dur="4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="-85" cy="-6" r="2" fill="var(--cyan-light)" opacity="0.5">
      <animate attributeName="cx" values="-85;-28;28;85" dur="3.5s" repeatCount="indefinite" begin="0.7s"/>
      <animate attributeName="cy" values="-6;-26;-26;-6" dur="3.5s" repeatCount="indefinite" begin="0.7s"/>
      <animate attributeName="opacity" values="0.5;0.15;0.15;0.5" dur="3.5s" repeatCount="indefinite" begin="0.7s"/>
    </circle>
    <circle cx="-42" cy="-14" r="1.8" fill="var(--amber)" opacity="0.4">
      <animate attributeName="cx" values="-42;0;42" dur="3s" repeatCount="indefinite" begin="1.4s"/>
      <animate attributeName="cy" values="-14;-34;-14" dur="3s" repeatCount="indefinite" begin="1.4s"/>
      <animate attributeName="opacity" values="0.4;0.12;0.4" dur="3s" repeatCount="indefinite" begin="1.4s"/>
    </circle>

    <!-- 底部基准线 -->
    <line x1="-280" y1="48" x2="280" y2="48" stroke="var(--border)" stroke-width="0.8"/>
  </g>

  <!-- ====== 品牌文字 ====== -->
  <g transform="translate(600, 300)">
    <!-- OPEN -->
    <text x="-275" y="0"
          font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif"
          font-size="90"
          font-weight="800"
          letter-spacing="8"
          fill="var(--cyan)">OPEN</text>

    <!-- BRIGE -->
    <text x="-5" y="0"
          font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif"
          font-size="90"
          font-weight="800"
          letter-spacing="8"
          fill="var(--amber)">BRIGE</text>

    <!-- 下划线 -->
    <line x1="-310" y1="22" x2="310" y2="22" stroke="var(--border)" stroke-width="1.2"/>
    <line x1="-230" y1="30" x2="230" y2="30" stroke="var(--border-subtle)" stroke-width="0.6"/>

    <!-- 版本号 -->
    <text x="320" y="-42"
          font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace"
          font-size="14"
          fill="var(--text-tertiary)">v0.1</text>
  </g>

  <!-- ====== 标语（双语）====== -->
  <g transform="translate(600, 352)">
    <text x="0" y="0"
          text-anchor="middle"
          font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace"
          font-size="16"
          font-weight="500"
          letter-spacing="3"
          fill="var(--text-secondary)">AGENT IS A BLACK BOX. OPENBRIGE IS THE COCKPIT.</text>
    <text x="0" y="24"
          text-anchor="middle"
          font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace"
          font-size="16"
          font-weight="500"
          letter-spacing="2"
          fill="var(--text-tertiary)">Agent 是黑盒，OpenBrige 是驾驶舱。</text>
  </g>

  <!-- ====== 底部标签 ====== -->
  <g transform="translate(600, 405)" opacity="0.6">
    <rect x="-275" y="-13" width="92" height="26" rx="13" fill="none" stroke="var(--border)" stroke-width="1"/>
    <text x="-229" y="5" text-anchor="middle" font-family="ui-monospace, monospace" font-size="11" font-weight="600" letter-spacing="0.5" fill="var(--text-secondary)">LOCAL-FIRST</text>

    <rect x="-175" y="-13" width="92" height="26" rx="13" fill="none" stroke="var(--border)" stroke-width="1"/>
    <text x="-129" y="5" text-anchor="middle" font-family="ui-monospace, monospace" font-size="11" font-weight="600" letter-spacing="0.5" fill="var(--text-secondary)">OPEN SOURCE</text>

    <rect x="-75" y="-13" width="76" height="26" rx="13" fill="none" stroke="var(--border)" stroke-width="1"/>
    <text x="-37" y="5" text-anchor="middle" font-family="ui-monospace, monospace" font-size="11" font-weight="600" letter-spacing="0.5" fill="var(--text-secondary)">AGPL-3.0</text>

    <rect x="13" y="-13" width="84" height="26" rx="13" fill="none" stroke="var(--border)" stroke-width="1"/>
    <text x="55" y="5" text-anchor="middle" font-family="ui-monospace, monospace" font-size="11" font-weight="600" letter-spacing="0.5" fill="var(--text-secondary)">TYPESCRIPT</text>

    <rect x="103" y="-13" width="84" height="26" rx="13" fill="none" stroke="var(--border)" stroke-width="1"/>
    <text x="145" y="5" text-anchor="middle" font-family="ui-monospace, monospace" font-size="11" font-weight="600" letter-spacing="0.5" fill="var(--text-secondary)">WEBSOCKET</text>

    <rect x="193" y="-13" width="76" height="26" rx="13" fill="none" stroke="var(--border)" stroke-width="1"/>
    <text x="231" y="5" text-anchor="middle" font-family="ui-monospace, monospace" font-size="11" font-weight="600" letter-spacing="0.5" fill="var(--text-secondary)">WORKTREE</text>
  </g>

  <!-- ====== 四角刻度 ====== -->
  <g stroke="var(--border)" stroke-width="0.8" fill="none" opacity="0.3">
    <path d="M 32 32 L 32 52 M 32 32 L 52 32"/>
    <circle cx="32" cy="32" r="2" fill="var(--border)" stroke="none"/>
    <path d="M 1168 32 L 1168 52 M 1168 32 L 1148 32"/>
    <circle cx="1168" cy="32" r="2" fill="var(--border)" stroke="none"/>
    <path d="M 32 388 L 32 368 M 32 388 L 52 388"/>
    <circle cx="32" cy="388" r="2" fill="var(--border)" stroke="none"/>
    <path d="M 1168 388 L 1168 368 M 1168 388 L 1148 388"/>
    <circle cx="1168" cy="388" r="2" fill="var(--border)" stroke="none"/>
  </g>

  <!-- 边缘线框 -->
  <rect x="12" y="12" width="1176" height="396" rx="3" fill="none" stroke="var(--border)" stroke-width="0.7" opacity="0.35"/>
</svg>