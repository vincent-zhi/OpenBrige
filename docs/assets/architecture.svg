<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 320" width="800" height="320">
  <style>
    :root {
      --bg: #ffffff;
      --text: #0f172a;
      --text-secondary: #475569;
      --border: #e2e8f0;
      --border-strong: #cbd5e1;
      --accent: #0891b2;
      --accent-light: #22d3ee;
      --agent-bg: #f8fafc;
      --arrow: #94a3b8;
      --phone-bg: #f0fdfa;
      --computer-bg: #fff7ed;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0a0f1c;
        --text: #f8fafc;
        --text-secondary: #94a3b8;
        --border: #1e293b;
        --border-strong: #334155;
        --accent: #5eead4;
        --accent-light: #38bdf8;
        --agent-bg: #0f172a;
        --arrow: #475569;
        --phone-bg: #0f172a;
        --computer-bg: #0f172a;
      }
    }
  </style>

  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- 透明背景 -->
  <rect width="800" height="320" fill="transparent"/>

  <!-- ====== Your Phone ====== -->
  <g transform="translate(100, 60)">
    <rect x="-70" y="-35" width="140" height="70" rx="8" fill="var(--phone-bg)" stroke="var(--accent)" stroke-width="1.5" filter="url(#glow)"/>
    <rect x="-62" y="-27" width="124" height="54" rx="4" fill="none" stroke="var(--border)" stroke-width="0.8"/>
    <text x="0" y="-5" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="var(--text)">Your Phone</text>
    <text x="0" y="12" text-anchor="middle" font-family="ui-monospace, monospace" font-size="11" fill="var(--text-secondary)">(Browser)</text>
    <!-- 小圆点装饰 -->
    <circle cx="-55" cy="-20" r="2" fill="var(--accent)" opacity="0.6"/>
  </g>

  <!-- ====== Your Computer ====== -->
  <g transform="translate(600, 60)">
    <rect x="-80" y="-35" width="160" height="70" rx="8" fill="var(--computer-bg)" stroke="var(--accent-light)" stroke-width="1.5" filter="url(#glow)"/>
    <rect x="-72" y="-27" width="144" height="54" rx="4" fill="none" stroke="var(--border)" stroke-width="0.8"/>
    <text x="0" y="-5" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="var(--text)">Your Computer</text>
    <text x="0" y="12" text-anchor="middle" font-family="ui-monospace, monospace" font-size="11" fill="var(--text-secondary)">(OpenBrige Host)</text>
    <!-- 状态灯 -->
    <circle cx="-65" cy="-20" r="2" fill="#10b981" opacity="0.8"/>
    <circle cx="-58" cy="-20" r="2" fill="var(--accent)" opacity="0.5"/>
  </g>

  <!-- ====== 连接线：WebSocket / HTTPS ====== -->
  <g transform="translate(400, 45)">
    <!-- 双向箭头 -->
    <line x1="-180" y1="0" x2="180" y2="0" stroke="var(--accent)" stroke-width="1.5" opacity="0.6"/>
    <!-- 左箭头 -->
    <polygon points="-175,-4 -185,0 -175,4" fill="var(--accent)" opacity="0.6"/>
    <!-- 右箭头 -->
    <polygon points="175,-4 185,0 175,4" fill="var(--accent)" opacity="0.6"/>
    <!-- 标签 -->
    <text x="0" y="-8" text-anchor="middle" font-family="ui-monospace, monospace" font-size="10" font-weight="500" fill="var(--accent)" letter-spacing="1">WebSocket / HTTPS</text>
  </g>

  <!-- Same Wi-Fi 标签 -->
  <g transform="translate(400, 75)">
    <text x="0" y="0" text-anchor="middle" font-family="ui-monospace, monospace" font-size="9" fill="var(--text-secondary)" opacity="0.7">Same Wi-Fi</text>
  </g>

  <!-- ====== 垂直连接线 ====== -->
  <line x1="600" y1="95" x2="600" y2="130" stroke="var(--arrow)" stroke-width="1" stroke-dasharray="4,2" opacity="0.5"/>

  <!-- ====== 水平分支线 ====== -->
  <line x1="200" y1="130" x2="600" y2="130" stroke="var(--arrow)" stroke-width="1" opacity="0.4"/>

  <!-- ====== 向下箭头 ====== -->
  <g transform="translate(200, 130)">
    <line x1="0" y1="0" x2="0" y2="25" stroke="var(--arrow)" stroke-width="1" opacity="0.5"/>
    <polygon points="-3,20 0,28 3,20" fill="var(--arrow)" opacity="0.5"/>
  </g>
  <g transform="translate(400, 130)">
    <line x1="0" y1="0" x2="0" y2="25" stroke="var(--arrow)" stroke-width="1" opacity="0.5"/>
    <polygon points="-3,20 0,28 3,20" fill="var(--arrow)" opacity="0.5"/>
  </g>
  <g transform="translate(600, 130)">
    <line x1="0" y1="0" x2="0" y2="25" stroke="var(--arrow)" stroke-width="1" opacity="0.5"/>
    <polygon points="-3,20 0,28 3,20" fill="var(--arrow)" opacity="0.5"/>
  </g>

  <!-- ====== Agent 节点 ====== -->
  <!-- Claude Code -->
  <g transform="translate(200, 200)">
    <rect x="-55" y="-30" width="110" height="60" rx="6" fill="var(--agent-bg)" stroke="var(--border-strong)" stroke-width="1"/>
    <rect x="-47" y="-22" width="94" height="44" rx="3" fill="none" stroke="var(--border)" stroke-width="0.6"/>
    <text x="0" y="-2" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="var(--text)">Claude</text>
    <text x="0" y="14" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="var(--text-secondary)">Code</text>
  </g>

  <!-- Codex -->
  <g transform="translate(400, 200)">
    <rect x="-55" y="-30" width="110" height="60" rx="6" fill="var(--agent-bg)" stroke="var(--border-strong)" stroke-width="1"/>
    <rect x="-47" y="-22" width="94" height="44" rx="3" fill="none" stroke="var(--border)" stroke-width="0.6"/>
    <text x="0" y="-2" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="var(--text)">Codex</text>
    <text x="0" y="14" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="var(--text-secondary)"></text>
  </g>

  <!-- Aider -->
  <g transform="translate(600, 200)">
    <rect x="-55" y="-30" width="110" height="60" rx="6" fill="var(--agent-bg)" stroke="var(--border-strong)" stroke-width="1"/>
    <rect x="-47" y="-22" width="94" height="44" rx="3" fill="none" stroke="var(--border)" stroke-width="0.6"/>
    <text x="0" y="-2" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="var(--text)">Aider</text>
    <text x="0" y="14" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="var(--text-secondary)"></text>
  </g>

  <!-- ====== 底部说明 ====== -->
  <g transform="translate(400, 280)">
    <text x="0" y="0" text-anchor="middle" font-family="ui-monospace, monospace" font-size="10" fill="var(--text-secondary)" opacity="0.6" letter-spacing="1">... AND MORE AGENTS</text>
  </g>

  <!-- 四角装饰 -->
  <g stroke="var(--border)" stroke-width="0.6" fill="none" opacity="0.3">
    <path d="M 20 20 L 20 35 M 20 20 L 35 20"/>
    <path d="M 780 20 L 780 35 M 780 20 L 765 20"/>
    <path d="M 20 300 L 20 285 M 20 300 L 35 300"/>
    <path d="M 780 300 L 780 285 M 780 300 L 765 300"/>
  </g>
</svg>