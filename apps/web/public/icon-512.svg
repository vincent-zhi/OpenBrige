<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- 背景 -->
  <rect width="512" height="512" rx="120" fill="#0c0c0c"/>

  <!-- 外框细线 -->
  <rect x="36" y="36" width="440" height="440" rx="96" fill="none" stroke="#1c1c1c" stroke-width="4"/>

  <!-- 中心图形: 桥接枢纽 -->
  <g transform="translate(256, 256)">
    <!-- 外环刻度 -->
    <circle cx="0" cy="0" r="156" fill="none" stroke="#222" stroke-width="4"/>
    <circle cx="0" cy="0" r="134" fill="none" stroke="#2a2a2a" stroke-width="2.5"/>

    <!-- 四向刻度线 -->
    <line x1="0" y1="-156" x2="0" y2="-146" stroke="#404040" stroke-width="5" stroke-linecap="round"/>
    <line x1="0" y1="156" x2="0" y2="146" stroke="#404040" stroke-width="5" stroke-linecap="round"/>
    <line x1="-156" y1="0" x2="-146" y2="0" stroke="#404040" stroke-width="5" stroke-linecap="round"/>
    <line x1="156" y1="0" x2="146" y2="0" stroke="#404040" stroke-width="5" stroke-linecap="round"/>

    <!-- 中心圆环 -->
    <circle cx="0" cy="0" r="42" fill="none" stroke="#e5e5e5" stroke-width="8"/>
    <circle cx="0" cy="0" r="18" fill="#e5e5e5"/>

    <!-- 四向连接臂 -->
    <line x1="-42" y1="0" x2="-112" y2="0" stroke="#e5e5e5" stroke-width="8" stroke-linecap="round"/>
    <line x1="42" y1="0" x2="112" y2="0" stroke="#e5e5e5" stroke-width="8" stroke-linecap="round"/>
    <line x1="0" y1="-42" x2="0" y2="-112" stroke="#e5e5e5" stroke-width="8" stroke-linecap="round"/>
    <line x1="0" y1="42" x2="0" y2="112" stroke="#e5e5e5" stroke-width="8" stroke-linecap="round"/>

    <!-- 端点: 左=活跃(绿) 其余=待机(灰) -->
    <circle cx="-118" cy="0" r="13" fill="#22c55e"/>
    <circle cx="118" cy="0" r="13" fill="#525252"/>
    <circle cx="0" cy="-118" r="13" fill="#525252"/>
    <circle cx="0" cy="118" r="13" fill="#525252"/>
  </g>
</svg>
